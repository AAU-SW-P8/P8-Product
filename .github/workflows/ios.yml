name: iOS workflow

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]

jobs:
  build:
    name: Build and Test default scheme using any available iPhone simulator
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          lfs: true

      - name: Print Xcode Version
        run: xcodebuild -version

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default

      - name: Resolve Simulator
        id: sim
        run: |
          # List available iPhone simulator runtimes and devices
          echo "--- Available runtimes ---"
          xcrun simctl list runtimes
          echo "--- Available devices ---"
          xcrun simctl list devices available

          # Pick the first available iPhone device
          device_id=$(xcrun simctl list devices available -j \
            | ruby -e '
              require "json"
              data = JSON.parse(STDIN.read)
              data["devices"].each do |runtime, devices|
                next unless runtime.include?("iOS")
                devices.each do |d|
                  if d["name"].include?("iPhone") && d["isAvailable"]
                    puts d["udid"]
                    exit
                  end
                end
              end
            ')

          if [ -z "$device_id" ]; then
            echo "ERROR: No available iPhone simulator found"
            echo "Creating an iPhone simulator..."
            runtime=$(xcrun simctl list runtimes -j | ruby -e '
              require "json"
              runtimes = JSON.parse(STDIN.read)["runtimes"]
              ios = runtimes.select { |r| r["name"].include?("iOS") && r["isAvailable"] }.last
              puts ios["identifier"] if ios
            ')
            if [ -z "$runtime" ]; then
              echo "ERROR: No iOS runtime available"
              exit 1
            fi
            device_id=$(xcrun simctl create "CI iPhone" "iPhone 16" "$runtime")
          fi

          echo "Resolved simulator ID: $device_id"

          # Boot the simulator so xcodebuild can find it
          echo "Booting simulator..."
          xcrun simctl boot "$device_id" 2>/dev/null || true
          # Wait for it to finish booting
          xcrun simctl bootstatus "$device_id" -b

          echo "device_id=$device_id" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild build-for-testing -scheme "$scheme" -"$filetype_parameter" "$file_to_build" -destination "id=${{ steps.sim.outputs.device_id }}"

      - name: Test (All Test Plans)
        env:
          scheme: ${{ 'default' }}
          CI: true
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi

          if [ "`ls -A | grep -i \\.xcworkspace$`" ]; then
            filetype_parameter="workspace"
            file_to_build=$(ls -A | grep -i \\.xcworkspace$)
          else
            filetype_parameter="project"
            file_to_build=$(ls -A | grep -i \\.xcodeproj$)
          fi

          file_to_build=$(echo $file_to_build | awk '{$1=$1;print}')

          echo "Finding test plans..."

          testplans=$(find . -name "*.xctestplan" -exec basename {} .xctestplan \;)

          for plan in $testplans; do
            echo "Running test plan: $plan"
            xcodebuild test-without-building \
          -scheme "$scheme" \
          -"$filetype_parameter" "$file_to_build" \
          -testPlan "$plan" \
          -destination "id=${{ steps.sim.outputs.device_id }}"
          done
