name: Lint

on:
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

jobs:
  lint:
    name: Code Linting
    runs-on: macos-26
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint (Auto-Fix)
      if: always()
      run: swiftlint --fix --config .swiftlint.yml

    - name: Run SwiftLint Check
      if: always()
      run: swiftlint --config .swiftlint.yml

    - name: Commit and push changes
      if: always()
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: "style: auto-fix swiftlint linting issues"
        skip_dirty_check: false